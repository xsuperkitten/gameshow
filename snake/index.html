<!DOCTYPE html>
<html>
<head>
    <title>Canvas Snake Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #0d1b2a 0%, #050a0f 100%);
            font-family: 'Orbitron', sans-serif;
            color: #e0ffe0;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 32px 36px 28px;
            background: linear-gradient(145deg, #0a1628cc, #04080fcc);
            border: 1px solid #00ff8844;
            border-radius: 20px;
            box-shadow:
                0 0 40px #00ff4422,
                0 0 80px #00ff2211,
                inset 0 0 30px #00000066;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00ff88, #00ccff, #00ff88);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 0% }
            100% { background-position: 200% }
        }

        canvas {
            border-radius: 10px;
            border: 2px solid #00ff8855;
            box-shadow:
                0 0 20px #00ff8833,
                0 0 60px #00ff4411;
            background: #020c05;
            display: block;
        }

        p {
            font-size: 11px;
            letter-spacing: 2px;
            color: #44bb6688;
            text-transform: uppercase;
        }

        #speed-select {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        #speed-select label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #00cc88;
            text-transform: uppercase;
        }

        #speed-select select {
            background: #071a10;
            color: #00ff88;
            border: 1px solid #00ff8855;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #speed-select select:hover,
        #speed-select select:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff8844;
        }

        #startBtn {
            padding: 12px 48px;
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00cc66, #00aaff);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 20px #00cc6655, 0 4px 15px #00000055;
        }

        #startBtn:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 0 35px #00ff8877, 0 6px 20px #00000066;
        }

        #startBtn:active {
            transform: translateY(0) scale(0.98);
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Classic Canvas Snake</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Use Arrow Keys to move.</p>
    <div id="speed-select">
        <label for="speedChoice">Speed:</label>
        <select id="speedChoice">
            <option value="220">Slow</option>
            <option value="150" selected>Normal</option>
            <option value="80">Fast</option>
        </select>
        <label for="fireMode">Fireball:</label>
        <select id="fireMode">
            <option value="3">3 shots</option>
            <option value="unlimited">Unlimited</option>
        </select>
        <label for="specialInterval">Special Items:</label>
        <select id="specialInterval">
            <option value="5">Every 5 fruits</option>
            <option value="10" selected>Every 10 fruits</option>
        </select>
        <label for="sizeChoice">Board Size:</label>
        <select id="sizeChoice">
            <option value="300">Small (300px)</option>
            <option value="400" selected>Medium (400px)</option>
            <option value="560">Large (560px)</option>
        </select>
    </div>
    <button id="startBtn">Start Game</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game settings (gridSize fixed, canvas resized on start)
    const gridSize = 20;
    let tileCount = canvas.width / gridSize;
    let snake = [];
    let food = {};
    let fireFruit = null;
    let fireCharges = 0;
    let poisonFruit = null;
    let poisonActive = false;
    let bomb = null;
    let fruitsEaten = 0;
    let specialInterval = 10;
    let specialIndex = 0; // cycles 0=fire, 1=poison, 2=bomb
    let dx = 0; // velocity x
    let dy = 0; // velocity y
    let score = 0;
    let gameRunning = false;
    let speed = 100; // Lower is faster

    // Initialize snake in the center
    let snakeX = Math.floor(tileCount / 2) * gridSize;
    let snakeY = Math.floor(tileCount / 2) * gridSize;
    snake = [{ x: snakeX, y: snakeY }];
    dx = 1; // Start moving right
    dy = 0;

    // --- Functions ---

    function placeFood() {
        let newFoodX, newFoodY;
        do {
            newFoodX = Math.floor(Math.random() * tileCount) * gridSize;
            newFoodY = Math.floor(Math.random() * tileCount) * gridSize;
        } while (snake.some(s => s.x === newFoodX && s.y === newFoodY));
        food = { x: newFoodX, y: newFoodY };
    }

    function placeFireFruit() {
        let x, y;
        do {
            x = Math.floor(Math.random() * tileCount) * gridSize;
            y = Math.floor(Math.random() * tileCount) * gridSize;
        } while (snake.some(s => s.x === x && s.y === y) || (x === food.x && y === food.y));
        fireFruit = { x, y };
    }

    function placePoisonFruit() {
        let x, y;
        do {
            x = Math.floor(Math.random() * tileCount) * gridSize;
            y = Math.floor(Math.random() * tileCount) * gridSize;
        } while (
            snake.some(s => s.x === x && s.y === y) ||
            (x === food.x && y === food.y) ||
            (fireFruit && x === fireFruit.x && y === fireFruit.y)
        );
        poisonFruit = { x, y };
    }

    function placeBomb() {
        let x, y;
        do {
            x = Math.floor(Math.random() * tileCount) * gridSize;
            y = Math.floor(Math.random() * tileCount) * gridSize;
        } while (
            snake.some(s => s.x === x && s.y === y) ||
            (x === food.x && y === food.y) ||
            (fireFruit  && x === fireFruit.x  && y === fireFruit.y) ||
            (poisonFruit && x === poisonFruit.x && y === poisonFruit.y)
        );
        bomb = { x, y };
    }

    function spawnNextSpecial() {
        if      (specialIndex % 3 === 0) placeFireFruit();
        else if (specialIndex % 3 === 1) placePoisonFruit();
        else                             placeBomb();
        specialIndex++;
    }

    function isWallHit(x, y) {
        return x < 0 || x >= canvas.width || y < 0 || y >= canvas.height;
    }

    function drawRoundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    let foodPulse = 0;

    function draw() {
        // Background with subtle grid
        ctx.fillStyle = '#020c05';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0a1f0e';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= canvas.width; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Food — glowing pulsing apple
        foodPulse += 0.08;
        const pulse = 1 + Math.sin(foodPulse) * 0.15;
        const fx = food.x + gridSize / 2, fy = food.y + gridSize / 2;
        const fr = (gridSize / 2 - 2) * pulse;
        ctx.save();
        ctx.shadowColor = '#ff4466';
        ctx.shadowBlur = 18;
        const foodGrad = ctx.createRadialGradient(fx - 2, fy - 2, 1, fx, fy, fr);
        foodGrad.addColorStop(0, '#ffaacc');
        foodGrad.addColorStop(1, '#ff1144');
        ctx.fillStyle = foodGrad;
        ctx.beginPath();
        ctx.arc(fx, fy, fr, 0, Math.PI * 2);
        ctx.fill();
        // stem
        ctx.strokeStyle = '#44ff88';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(fx, fy - fr);
        ctx.quadraticCurveTo(fx + 4, fy - fr - 5, fx + 6, fy - fr - 3);
        ctx.stroke();
        ctx.restore();

        // Fire fruit — flame orb
        if (fireFruit) {
            const ffx = fireFruit.x + gridSize / 2, ffy = fireFruit.y + gridSize / 2;
            const ffPulse = 1 + Math.sin(foodPulse * 1.4) * 0.2;
            const ffr = (gridSize / 2 - 2) * ffPulse;
            ctx.save();
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 24;
            const ffGrad = ctx.createRadialGradient(ffx - 2, ffy - 3, 1, ffx, ffy, ffr);
            ffGrad.addColorStop(0, '#ffffff');
            ffGrad.addColorStop(0.3, '#ffee44');
            ffGrad.addColorStop(0.7, '#ff6600');
            ffGrad.addColorStop(1,   '#cc1100');
            ctx.fillStyle = ffGrad;
            ctx.beginPath(); ctx.arc(ffx, ffy, ffr, 0, Math.PI * 2); ctx.fill();
            // flame tip
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(ffx - 3, ffy - ffr);
            ctx.quadraticCurveTo(ffx, ffy - ffr - 7, ffx + 3, ffy - ffr - 2);
            ctx.stroke();
            ctx.restore();
        }

        // Poison fruit — purple toxic orb
        if (poisonFruit) {
            const pfx = poisonFruit.x + gridSize / 2, pfy = poisonFruit.y + gridSize / 2;
            const pfPulse = 1 + Math.sin(foodPulse * 1.2 + 2) * 0.18;
            const pfr = (gridSize / 2 - 2) * pfPulse;
            ctx.save();
            ctx.shadowColor = '#aa00ff';
            ctx.shadowBlur = 22;
            const pfGrad = ctx.createRadialGradient(pfx - 1, pfy - 2, 1, pfx, pfy, pfr);
            pfGrad.addColorStop(0, '#eeccff');
            pfGrad.addColorStop(0.4, '#aa33ff');
            pfGrad.addColorStop(1,   '#440088');
            ctx.fillStyle = pfGrad;
            ctx.beginPath(); ctx.arc(pfx, pfy, pfr, 0, Math.PI * 2); ctx.fill();
            // skull symbol
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.font = `${gridSize * 0.65}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☠', pfx, pfy + 1);
            ctx.restore();
        }

        // Bomb — dark orb with sparkling fuse
        if (bomb) {
            const bx = bomb.x + gridSize / 2, by = bomb.y + gridSize / 2;
            const br = gridSize / 2 - 1;
            ctx.save();
            ctx.shadowColor = '#ff4400';
            ctx.shadowBlur = 14;
            const bGrad = ctx.createRadialGradient(bx - 2, by - 2, 1, bx, by, br);
            bGrad.addColorStop(0, '#666');
            bGrad.addColorStop(1, '#111');
            ctx.fillStyle = bGrad;
            ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
            // shine
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath(); ctx.arc(bx - 3, by - 3, br * 0.4, 0, Math.PI * 2); ctx.fill();
            // fuse
            ctx.strokeStyle = '#aa7700';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(bx + 2, by - br);
            ctx.quadraticCurveTo(bx + 8, by - br - 6, bx + 5, by - br - 10);
            ctx.stroke();
            // spark
            const spark = 0.5 + Math.sin(foodPulse * 5) * 0.5;
            ctx.fillStyle = `rgba(255, ${180 + spark * 60}, 0, ${0.7 + spark * 0.3})`;
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(bx + 5, by - br - 10, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        // Poison aura — soft translucent glow around each segment
        if (poisonActive) {
            ctx.save();
            ctx.globalAlpha = 0.55;
            snake.forEach(seg => {
                const cx = seg.x + gridSize / 2, cy = seg.y + gridSize / 2;
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, gridSize * 1.6);
                grad.addColorStop(0,   'rgba(200, 100, 255, 1)');
                grad.addColorStop(0.5, 'rgba(150,  0, 220, 0.6)');
                grad.addColorStop(1,   'rgba(100,  0, 180, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, gridSize * 1.6, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        // Snake — gradient body with glow
        const len = snake.length;
        snake.forEach((seg, i) => {
            const t = i / Math.max(len - 1, 1);
            // head = cyan-green, tail = dark teal
            const r = Math.round((0 * (1 - t) + 0 * t));
            const g = Math.round((255 * (1 - t) + 120 * t));
            const b = Math.round((180 * (1 - t) + 80 * t));
            const color = `rgb(${r},${g},${b})`;
            const pad = i === 0 ? 1 : 2;
            const radius = i === 0 ? 6 : 4;

            ctx.save();
            ctx.shadowColor = i === 0 ? '#00ffcc' : '#00ff88';
            ctx.shadowBlur = i === 0 ? 18 : 8;
            ctx.fillStyle = color;
            drawRoundRect(seg.x + pad, seg.y + pad, gridSize - pad * 2, gridSize - pad * 2, radius);
            ctx.fill();

            // Shine highlight on each segment
            const shimGrad = ctx.createLinearGradient(seg.x, seg.y, seg.x, seg.y + gridSize * 0.5);
            shimGrad.addColorStop(0, 'rgba(255,255,255,0.18)');
            shimGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shimGrad;
            drawRoundRect(seg.x + pad, seg.y + pad, gridSize - pad * 2, (gridSize - pad * 2) * 0.5, radius);
            ctx.fill();
            ctx.restore();

            // Eyes on head
            if (i === 0) {
                const ex = dx === -1 ? seg.x + 4 : dx === 1 ? seg.x + gridSize - 7 : seg.x + 4;
                const ey = dy === -1 ? seg.y + 4 : dy === 1 ? seg.y + gridSize - 7 : seg.y + 4;
                const ex2 = dx === 0 ? seg.x + gridSize - 7 : ex;
                const ey2 = dy === 0 ? ey : seg.y + gridSize - 7;
                [[ ex, ey ], [ ex2, ey2 ]].forEach(([ex, ey]) => {
                    ctx.save();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(ex + dx * 0.8, ey + dy * 0.8, 1.2, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                });
            }
        });

        // HUD
        ctx.save();
        ctx.font = 'bold 13px Orbitron, monospace';
        ctx.fillStyle = '#00ff8899';
        ctx.fillText('SCORE  ' + score, 10, 22);
        ctx.textAlign = 'right';
        if (fireCharges > 0) {
            ctx.fillStyle = '#ff8800cc';
            ctx.fillText('🔥 ' + (fireCharges === Infinity ? '∞' : fireCharges), canvas.width - 10, 22);
        }
        if (poisonActive) {
            ctx.fillStyle = '#bb44ffcc';
            ctx.fillText('☠ AURA', canvas.width - 10, 40);
        }
        ctx.restore();

        drawFireballs();
    }

    let lastTime = 0;

    function updateGame(timestamp) {
        if (!gameRunning) return;
        if (timestamp - lastTime < speed) return;
        lastTime = timestamp;

        let newHeadX = snake[0].x + dx * gridSize;
        let newHeadY = snake[0].y + dy * gridSize;

        if (isWallHit(newHeadX, newHeadY)) { gameOver(); return; }
        if (snake.some(s => s.x === newHeadX && s.y === newHeadY)) { gameOver(); return; }

        const ateFood       = newHeadX === food.x && newHeadY === food.y;
        const ateFireFruit  = fireFruit   && newHeadX === fireFruit.x   && newHeadY === fireFruit.y;
        const atePoisonFruit= poisonFruit && newHeadX === poisonFruit.x && newHeadY === poisonFruit.y;
        const ateBomb       = bomb        && newHeadX === bomb.x         && newHeadY === bomb.y;

        if (ateFood) {
            snake = [{ x: newHeadX, y: newHeadY }, ...snake];
            score++;
            fruitsEaten++;
            placeFood();
            if (fruitsEaten % specialInterval === 0) spawnNextSpecial();
        } else if (ateFireFruit) {
            snake = [{ x: newHeadX, y: newHeadY }, ...snake];
            fireCharges = fireModeUnlimited ? Infinity : fireCharges + 3;
            triggerFoodExplosion(newHeadX + gridSize / 2, newHeadY + gridSize / 2);
            fireFruit = null;
        } else if (atePoisonFruit) {
            snake = [{ x: newHeadX, y: newHeadY }, ...snake];
            poisonActive = true;
            triggerFoodExplosion(newHeadX + gridSize / 2, newHeadY + gridSize / 2);
            poisonFruit = null;
        } else if (ateBomb) {
            triggerFoodExplosion(newHeadX + gridSize / 2, newHeadY + gridSize / 2);
            const newSnake = [{ x: newHeadX, y: newHeadY }, ...snake.slice(0, -1)];
            if (newSnake.length <= 2) { gameOver(); return; }
            snake = newSnake.slice(0, -2);
            bomb = null;
        } else {
            snake = [{ x: newHeadX, y: newHeadY }, ...snake.slice(0, -1)];
        }

        // Poison aura — auto-eat any fruit within 1 cell of any segment
        if (poisonActive) {
            const inAura = (fx, fy) => snake.some(s =>
                Math.abs(fx - s.x) <= gridSize && Math.abs(fy - s.y) <= gridSize &&
                !(fx === s.x && fy === s.y)
            );
            if (inAura(food.x, food.y)) {
                snake = [...snake, { ...snake[snake.length - 1] }];
                score++;
                triggerFoodExplosion(food.x + gridSize / 2, food.y + gridSize / 2);
                placeFood();
            }
            if (fireFruit && inAura(fireFruit.x, fireFruit.y)) {
                snake = [...snake, { ...snake[snake.length - 1] }];
                fireCharges = fireModeUnlimited ? Infinity : fireCharges + 3;
                triggerFoodExplosion(fireFruit.x + gridSize / 2, fireFruit.y + gridSize / 2);
                fireFruit = null;
            }
            if (bomb && inAura(bomb.x, bomb.y)) {
                triggerFoodExplosion(bomb.x + gridSize / 2, bomb.y + gridSize / 2);
                bomb = null;
            }
        }

    }

    // --- Fireball ---
    let fireballs = [];

    function shootFireball() {
        if (!gameRunning || (dx === 0 && dy === 0) || fireCharges <= 0) return;
        fireCharges--;
        const head = snake[0];
        fireballs.push({
            x: head.x + gridSize / 2,
            y: head.y + gridSize / 2,
            vx: dx * 7,
            vy: dy * 7,
            trail: []
        });
    }

    function updateFireballs() {
        for (let i = fireballs.length - 1; i >= 0; i--) {
            const fb = fireballs[i];
            fb.trail.push({ x: fb.x, y: fb.y });
            if (fb.trail.length > 12) fb.trail.shift();
            fb.x += fb.vx;
            fb.y += fb.vy;

            if (fb.x < 0 || fb.x >= canvas.width || fb.y < 0 || fb.y >= canvas.height) {
                fireballs.splice(i, 1); continue;
            }

            const fx = food.x + gridSize / 2, fy = food.y + gridSize / 2;
            if (Math.hypot(fb.x - fx, fb.y - fy) < gridSize) {
                snake = [...snake, { ...snake[snake.length - 1] }];
                score++;
                placeFood();
                fireballs.splice(i, 1);
                triggerFoodExplosion(fx, fy);
                continue;
            }
            if (bomb) {
                const bx = bomb.x + gridSize / 2, by = bomb.y + gridSize / 2;
                if (Math.hypot(fb.x - bx, fb.y - by) < gridSize) {
                    triggerFoodExplosion(bx, by);
                    bomb = null;
                    fireballs.splice(i, 1);
                    continue;
                }
            }
        }
    }

    // Explosion particles
    let particles = [];
    function triggerFoodExplosion(x, y) {
        for (let i = 0; i < 18; i++) {
            const angle = (Math.PI * 2 / 18) * i;
            particles.push({ x, y, vx: Math.cos(angle) * (2 + Math.random() * 3),
                vy: Math.sin(angle) * (2 + Math.random() * 3),
                life: 1.0, color: ['#ff4466','#ffaa00','#ffff44'][i % 3] });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= 0.04;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawFireballs() {
        // Particles
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 8;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        // Fireballs
        fireballs.forEach(fb => {
            fb.trail.forEach((t, i) => {
                const alpha = (i / fb.trail.length) * 0.7;
                const r = (i / fb.trail.length) * 6;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.shadowColor = '#ff6600';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ff4400';
                ctx.beginPath();
                ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            ctx.save();
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = 30;
            const grad = ctx.createRadialGradient(fb.x - 1, fb.y - 1, 0, fb.x, fb.y, 9);
            grad.addColorStop(0,   '#ffffff');
            grad.addColorStop(0.2, '#ffff88');
            grad.addColorStop(0.6, '#ff6600');
            grad.addColorStop(1,   '#cc0000');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(fb.x, fb.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
    }

    function gameOver() {
        gameRunning = false;

        // Dim overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Panel
        const pw = 280, ph = 160;
        const px = (canvas.width - pw) / 2, py = (canvas.height - ph) / 2;
        ctx.save();
        ctx.shadowColor = '#ff2244';
        ctx.shadowBlur = 40;
        ctx.fillStyle = '#0a0410';
        ctx.strokeStyle = '#ff224466';
        ctx.lineWidth = 1.5;
        drawRoundRect(px, py, pw, ph, 14);
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        const cx = canvas.width / 2;

        // Title
        ctx.save();
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px Orbitron, monospace';
        ctx.shadowColor = '#ff2244';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ff4466';
        ctx.fillText('GAME OVER', cx, py + 52);

        // Score
        ctx.font = 'bold 13px Orbitron, monospace';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#00ff88';
        ctx.fillText('SCORE  ' + score, cx, py + 88);

        // Hint
        ctx.font = '11px Orbitron, monospace';
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#44664455';
        ctx.fillText('press  RESTART  to play again', cx, py + 128);
        ctx.restore();
    }

    // --- Input Handling ---

    document.addEventListener('keydown', (event) => {
        if (!gameRunning) return;

        let newDx = dx;
        let newDy = dy;

        switch (event.key) {
            case 'ArrowUp':
                newDx = 0;
                newDy = -1;
                break;
            case 'ArrowDown':
                newDx = 0;
                newDy = 1;
                break;
            case 'ArrowLeft':
                newDx = -1;
                newDy = 0;
                break;
            case 'ArrowRight':
                newDx = 1;
                newDy = 0;
                break;
            default:
                return;
        }

        if (newDx !== dx && newDy !== dy) {
            dx = newDx;
            dy = newDy;
        }
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'a' || event.key === 'A') shootFireball();
    });


    // --- Game Loop Initialization ---

    let baseSpeed = 150;
    let fireModeUnlimited = false;

    function startGame() {
        gameRunning = false; // stop any existing loop
        baseSpeed = parseInt(speedChoice.value);
        fireModeUnlimited = fireModeEl.value === 'unlimited';
        const boardSize = parseInt(sizeChoice.value);
        canvas.width = boardSize;
        canvas.height = boardSize;
        tileCount = boardSize / gridSize;
        gameRunning = true;
        score = 0;
        speed = baseSpeed;
        dx = 1;
        dy = 0;
        const center = Math.floor(tileCount / 2) * gridSize;
        snake = [{ x: center, y: center }];
        fireballs = [];
        particles = [];
        fireCharges = 0;
        poisonActive = false;
        fireFruit = null;
        poisonFruit = null;
        bomb = null;
        fruitsEaten = 0;
        specialIndex = 0;
        specialInterval = parseInt(document.getElementById('specialInterval').value);
        placeFood();

        requestAnimationFrame(gameLoop);
    }

    function gameLoop(timestamp) {
        if (!gameRunning) return;
        updateGame(timestamp);
        if (!gameRunning) return; // gameOver() was triggered inside updateGame
        updateFireballs();
        updateParticles();
        draw();
        requestAnimationFrame(gameLoop);
    }

    const startBtn = document.getElementById('startBtn');
    const speedChoice = document.getElementById('speedChoice');
    const sizeChoice = document.getElementById('sizeChoice');
    const fireModeEl = document.getElementById('fireMode');

    startBtn.addEventListener('click', () => {
        startBtn.textContent = 'Restart';
        startGame();
    });

    // Draw idle screen on load
    draw();

</script>
</body>
</html>
